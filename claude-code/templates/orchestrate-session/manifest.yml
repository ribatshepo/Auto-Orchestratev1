# ---- cross-cardinality consistency checks (the completeness checker runs these) ----
consistency_checks:
  - id: CONS-001
    description: |
      Every D in proposed-tasks.json#tasks[].deliverable must have
      stage-0/<D>/research.md and stage-0/<D>/stage-receipt.json and
      stage-1/<D>/proposed-tasks.json and stage-1/<D>/stage-receipt.json and
      stage-1/<D>/gate-approval-decomposition-<D>-*.json.

  - id: CONS-002
    description: |
      Every T in proposed-tasks.json#tasks[].id must have
      stage-2/<T>/spec.md and stage-2/<T>/stage-receipt.json and
      stage-2/<T>/gate-approval-task-creation-<T>-*.json and
      stage-3/<T>/stage-receipt.json and stage-3/<T>/changes.md.

  - id: CONS-003
    description: |
      Every stage that opens MUST have a matching phase-receipt under
      phase-receipts/phase-stage-<N>-*.json. Sub-phase receipts
      (phase-5v-*, phase-5e-*, phase-5q-*, phase-5s-*, phase-5i-*,
      phase-5d-*) are added only when those sub-phases fire.

  - id: CONS-004
    description: |
      Every stage in {2, 3, 5, 6} MUST have at least one real review under
      domain-reviews/*-stage-<N>*.md. Real reviews include both
      activation-rule-fired (per agents[*].activation_rules[]) and baseline
      qa-engineer reviews emitted by MAIN-017 Stage-Close Protocol Part 1.2
      when zero rules fire. Sentinel "*-none-*" files DO NOT count
      (ARTIFACT-COMPLETENESS-001).

  - id: CONS-005
    description: |
      meetings/ MUST contain at least one real meeting receipt for the session.
      Real receipts include canonical meetings (P-020/026/027/028/029/076),
      reasoning-gate Multi-Agent Sync minutes, and baseline check-ins
      emitted by MAIN-017 Stage-Close Protocol Part 1.4. Sentinel
      "*-none-*" files DO NOT count (ARTIFACT-COMPLETENESS-001).

  - id: CONS-006
    description: |
      reasoning-traces/ MUST contain at least one trace per session. Real
      traces come from meta-reasoner invocations; baseline traces
      (stage-<N>-baseline.json) are written by MAIN-017 Stage-Close
      Protocol Part 1.3 when meta-reasoner was not invoked.

  - id: CONS-007
    description: |
      session_root MUST live under .orchestrate/ (LAYOUT-GATE-001 /
      ORCHESTRATE-FLAT-001). Sessions found at the repo root violate the
      unified layout; check-completeness.py --allow-unrooted bypasses
      this check for forensic standalone runs. auto-orchestrate.md
      Step 3.0a self-heals via `mv <sid> .orchestrate/<sid>` at next spawn.
