# Deterministic Session Artifact Manifest
# ----------------------------------------
# Single source of truth for what every auto-orchestrate session MUST produce.
# Read by:
#   - claude-code/commands/auto-orchestrate.md (orchestration steps reference rule IDs)
#   - templates/orchestrate-session/check-completeness.py (validator)
# Rule shape:
#   id            stable identifier; cited from orchestrator/agents (e.g. ART-S0-002)
#   path          glob relative to .orchestrate/<sid>/; {placeholders} expand below
#   template      path under templates/orchestrate-session/ used to seed the file
#   schema        JSON-schema (under schemas/) that the artifact MUST validate against,
#                 or "markdown" for prose artifacts
#   owner         agent or skill responsible for writing
#   cardinality   one | one-per-deliverable | one-per-task | one-per-stage |
#                 one-per-category | one-per-gate | one-per-process | one-or-more
#   required      true | false  (false only for purely event-driven artifacts where
#                 absence is itself a valid state — currently NONE are false)
#   when          optional human-readable description of when this fires
# Placeholders:
#   {sid}         session id
#   {deliverable} D-NN identifier
#   {task}        DNN-TN identifier
#   {stage}       stage number (0|1|2|3|4|4.5|5|6)
#   {category}    stage-6 doc category (api|integration|ops-runbook|adr|user-guide|changelog)
#   {gate}        gate identifier (intent-review|scope-lock|...)
#   {process}     meeting / process identifier (p-027|p-028|...)
#   {ts}          ISO-8601 compact timestamp YYYYMMDDTHHMMSSZ
#   {date}        ISO-8601 date YYYY-MM-DD

schema_version: "1.0.0"

rules:

  # ---------------- session-root ----------------
  - id: ART-ROOT-001
    path: checkpoint.json
    template: session/checkpoint.json
    schema: schemas/checkpoint.schema.json
    owner: orchestrator
    cardinality: one
    required: true
    when: session start; updated after every iteration

  - id: ART-ROOT-002
    path: MANIFEST.jsonl
    template: session/MANIFEST.jsonl
    schema: schemas/manifest-entry.schema.json
    owner: orchestrator
    cardinality: one
    required: true
    when: append one line per artifact write

  - id: ART-ROOT-003
    path: continuity-brief.md
    template: session/continuity-brief.md
    schema: markdown
    owner: continuity-scout
    cardinality: one
    required: true
    when: Pre-P1; produced by the continuity-scout consolidator after CONT-007 fan-out

  - id: ART-ROOT-003a
    path: continuity-brief/parts/scout-jsonl.json
    template: session/continuity-brief-parts/scout-jsonl.json
    schema: schemas/continuity-brief-part.schema.json
    owner: scout-jsonl
    cardinality: one
    required: true
    when: Step -0.5; CONT-007 / SCOUT-FANOUT-001 — domain JSONL stores partial

  - id: ART-ROOT-003b
    path: continuity-brief/parts/scout-sessions.json
    template: session/continuity-brief-parts/scout-sessions.json
    schema: schemas/continuity-brief-part.schema.json
    owner: scout-sessions
    cardinality: one
    required: true
    when: Step -0.5; CONT-007 / SCOUT-FANOUT-001 — 3 newest prior sessions partial

  - id: ART-ROOT-003c
    path: continuity-brief/parts/scout-pipeline.json
    template: session/continuity-brief-parts/scout-pipeline.json
    schema: schemas/continuity-brief-part.schema.json
    owner: scout-pipeline
    cardinality: one
    required: true
    when: Step -0.5; CONT-007 / SCOUT-FANOUT-001 — baselines + audit ledger partial

  - id: ART-ROOT-003d
