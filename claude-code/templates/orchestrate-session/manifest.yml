    schema: schemas/continuity-brief-part.schema.json
    owner: scout-context
    cardinality: one
    required: true
    when: Step -0.5; CONT-007 / SCOUT-FANOUT-001 — user prefs + codebase analysis partial

  - id: ART-ROOT-004
